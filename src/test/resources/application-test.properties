# Spring Boot properties for testing with H2 database
spring.datasource.url=jdbc:h2:mem:nutritrackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mock values for integrations
aws.s3.bucket=mock-bucket
aws.s3.region=us-east-1
resend.api.key=mock-key
email.from=test@nutritrack.com

