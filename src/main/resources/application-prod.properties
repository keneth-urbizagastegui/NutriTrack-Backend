server.port=${PORT:8080}

# Datasource Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# H2 Console Configuration (Disabled in prod)
spring.h2.console.enabled=false

# Security JWT Config
jwt.secret=${JWT_SECRET}
jwt.expiration.access=${JWT_EXPIRATION_ACCESS:3600000}

# AWS S3 Bucket Config
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.region=${AWS_REGION:us-east-1}

# Resend API / Email Config
resend.api.key=${RESEND_API_KEY}
email.from=${EMAIL_FROM}

# Mail Sender Configuration (Fallback/Thymeleaf)
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator Configuration for Health Probes (Required by ECS ALB)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

# CORS origins
app.cors.allowed-origins=${CORS_ORIGINS:*}
