spring.application.name=NutriTrack-API

# Datasource Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:nutritrack_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# H2 Console Configuration (For dev/testing H2 support)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Security JWT Config
jwt.secret=${JWT_SECRET:123456789012345678901234567890123456789}
jwt.expiration.access=${JWT_EXPIRATION_ACCESS:3600000}

# AWS S3 Bucket Config
aws.s3.bucket=${AWS_S3_BUCKET:nutritrack-certificates}
aws.s3.region=${AWS_REGION:us-east-1}

# Resend API / Email Config
resend.api.key=${RESEND_API_KEY:re_yourResendApiKey}
email.from=${EMAIL_FROM:onboarding@resend.dev}

# Mail Sender Configuration (Fallback/Thymeleaf)
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY:re_yourResendApiKey}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Thymeleaf Template Cache (Disabled for development)
spring.thymeleaf.cache=false

# Task Execution (Async Configuration)
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25
spring.task.execution.thread-name-prefix=nutritrack-async-
